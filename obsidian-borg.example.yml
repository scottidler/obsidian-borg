server:
  host: "0.0.0.0"
  port: 8080

vault:
  inbox_path: "~/obsidian-vault/Inbox"

transcriber:
  url: "http://100.x.x.x:8090"  # Tailscale IP of youtube-siphon machine
  timeout_secs: 120

groq:
  api_key: "~/.config/groq/api-token"    # file path or env var name
  model: "whisper-large-v3"

llm:
  provider: "claude"
  model: "claude-sonnet-4-6"
  api_key: "~/.config/anthropic/api-token"  # file path or env var name

# Optional: uncomment to enable Telegram bot ingestion
# telegram:
#   bot_token: "~/.config/telegram/api-token"  # file path or env var name
#   allowed_chat_ids: []                        # empty = allow all, or list specific chat IDs

# Optional: uncomment to enable Discord bot ingestion
# discord:
#   bot_token: "~/.config/discord/api-token"   # file path or env var name
#   channel_id: 1234567890                      # only listen on this channel
